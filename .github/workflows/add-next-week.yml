name: Ajouter la semaine suivante

on:
  schedule:
    # Chaque vendredi à 20h00 heure de Paris (= 19h00 UTC en heure d'été)
    - cron: '0 19 * * 5'
  workflow_dispatch:

jobs:
  add-week:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ajouter la semaine suivante dans data.json
        run: |
          python3 << 'PYEOF'
          import json, datetime

          with open('data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          extra_days = data.get('extra_days', [])

          # Toutes les dates déjà connues (fixes semaines A+B + extra)
          all_dates = [
            datetime.date(2026, 3, 9),  datetime.date(2026, 3, 10),
            datetime.date(2026, 3, 11), datetime.date(2026, 3, 12),
            datetime.date(2026, 3, 13), datetime.date(2026, 3, 16),
            datetime.date(2026, 3, 17), datetime.date(2026, 3, 18),
            datetime.date(2026, 3, 19), datetime.date(2026, 3, 20),
          ]
          for d in extra_days:
              try:
                  all_dates.append(datetime.date.fromisoformat(d['dateObj'][:10]))
              except:
                  pass

          last_date = max(all_dates)

          # Trouver le lundi suivant
          next_monday = last_date + datetime.timedelta(days=1)
          while next_monday.weekday() != 0:
              next_monday += datetime.timedelta(days=1)

          # Vérifier que cette semaine n'existe pas déjà
          existing = {d['dateObj'][:10] for d in extra_days}
          if next_monday.isoformat() in existing:
              print(f"Semaine du {next_monday} déjà présente.")
              exit(0)

          # Noms français
          jours = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi']
          mois  = ['', 'janvier', 'février', 'mars', 'avril', 'mai', 'juin',
                   'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre']

          new_days = []
          for i in range(5):
              d = next_monday + datetime.timedelta(days=i)
              jour_nom = jours[d.weekday()]
              new_days.append({
                  "sheet":   d.isoformat(),
                  "label":   f"{jour_nom[:3]} {d.day}/{d.month}",
                  "date":    f"{jour_nom} {d.day} {mois[d.month]}",
                  "dateObj": d.isoformat() + "T00:00:00.000Z"
              })

          data['extra_days'] = extra_days + new_days
          data['last_updated'] = datetime.datetime.now(datetime.timezone.utc).isoformat()

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          friday = next_monday + datetime.timedelta(days=4)
          print(f"✅ Semaine ajoutée : {next_monday.strftime('%d/%m/%Y')} → {friday.strftime('%d/%m/%Y')}")
          PYEOF

      - name: Commit et push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🗓️ Semaine du $(date +'%d/%m/%Y') ajoutée automatiquement"
          git push
