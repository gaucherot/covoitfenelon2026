<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎒 Covoiturage Fénelon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --card: #1e2130;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --text: #e8eaf6;
    --text-muted: #8b8fa8;
    --border: #2a2d3e;
    --aller: #43e97b;
    --retour: #f7971e;
    --glow: rgba(108, 99, 255, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 80px;
  }

  /* HEADER */
  .app-header {
    background: linear-gradient(135deg, #1a1d27 0%, #2a1f3d 100%);
    border-bottom: 1px solid rgba(108,99,255,0.3);
    padding: 14px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .app-title {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .app-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 500;
    transition: color 0.2s;
    gap: 4px;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
  .nav-btn.active .nav-dot { opacity: 1; }

  /* SCREENS */
  .screen { display: none; padding: 16px; animation: fadeIn 0.2s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* SEARCH / SELECT */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px 12px 44px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 18px;
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card:active { transform: scale(0.98); }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card.selected::before { opacity: 1; }
  .card.selected { border-color: var(--accent); background: rgba(108,99,255,0.08); }

  /* PERSON CARD */
  .person-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .person-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-primaire { background: rgba(67, 233, 123, 0.15); color: var(--accent3); }
  .badge-college { background: rgba(108, 99, 255, 0.15); color: var(--accent); }
  .badge-lycee { background: rgba(255, 101, 132, 0.15); color: var(--accent2); }
  .badge-aller { background: rgba(67, 233, 123, 0.15); color: var(--accent3); }
  .badge-retour { background: rgba(247, 151, 30, 0.15); color: var(--accent4); }

  /* RIDE CARD */
  .ride-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .ride-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .ride-day {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ride-time {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .ride-direction { }
  
  .ride-location {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .location-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .location-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .location-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .kids-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .kid-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(108, 99, 255, 0.12);
    border: 1px solid rgba(108, 99, 255, 0.2);
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }
  .kid-chip .emoji { font-size: 14px; }

  .driver-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .driver-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }

  /* SECTION TITLES */
  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin: 20px 0 10px;
  }
  .section-title:first-child { margin-top: 0; }

  /* PROFILE CARDS */
  .info-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .info-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .info-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .info-value { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 2px; }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'Outfit', sans-serif;
  }
  .day-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 16px var(--glow);
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* SELECT */
  select.search-input {
    -webkit-appearance: none;
    cursor: pointer;
    padding-right: 40px;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* PHONE LINK */
  .phone-link {
    color: var(--accent3);
    text-decoration: none;
    font-weight: 600;
  }

  /* TOGGLE */
  .view-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
  }
  .toggle-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* COUNTER */
  .counter {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .ride-time-group {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 2px;
  }

  /* No kids notice */
  .no-kids {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
</style>
</head>

// Filter out days strictly before today (keep today and future)
function filterPastDays() {
  const now = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);

  // Trouver le lundi de référence :
  // - Lun-Ven : lundi de la semaine courante
  // - Sam-Dim : lundi de la semaine SUIVANTE (on anticipe)
  const dow = today.getDay(); // 0=dim, 1=lun ... 6=sam
  let monday = new Date(today);
  if (dow === 0) {
    // Dimanche : lundi dans 1 jour
    monday.setDate(today.getDate() + 1);
  } else if (dow === 6) {
    // Samedi : lundi dans 2 jours
    monday.setDate(today.getDate() + 2);
  } else {
    // Lundi-Vendredi : lundi de cette semaine
    monday.setDate(today.getDate() - (dow - 1));
  }

  // Fenêtre : 2 semaines à partir du lundi de référence
  // + 1 semaine supplémentaire si vendredi >= 20h
  const isFriday = dow === 5;
  const isAfter20h = now.getHours() >= 20;
  const extraWeek = (isFriday && isAfter20h) ? 7 : 0;
  const limit = new Date(monday);
  limit.setDate(monday.getDate() + 14 + extraWeek);

  // Garder les jours >= aujourd'hui ET dans la fenêtre
  DAYS = DAYS.filter(d => d.dateObj >= today && d.dateObj < limit);
}

// Load extra weeks from localStorage
function loadExtraDays() {
  try {
    const saved = localStorage.getItem('covoit_extra_days');
    if (!saved) return;
    const extra = JSON.parse(saved);
    extra.forEach(d => {
      d.dateObj = new Date(d.dateObj);
      if (!DAYS.find(x => x.sheet === d.sheet)) DAYS.push(d);
    });
  } catch(e) {}
}

  Object.entries(dc).forEach(([drv, kids]) => {
    kids.forEach(k => { if (!cd[k]) cd[k] = []; if (!cd[k].includes(drv)) cd[k].push(drv); });
  });
  return cd;

function getTodayIndex() {
  const today = new Date(); today.setHours(0,0,0,0);
  // Exact date match via dateObj
  let idx = DAYS.findIndex(d => d.dateObj && d.dateObj.getTime() === today.getTime());
  if (idx >= 0) return idx;
  // Find nearest future day
  for (let i = 0; i < DAYS.length; i++) {
    if (DAYS[i].dateObj && DAYS[i].dateObj >= today) return i;
  }
  return DAYS.length - 1; // fallback: last day
}


const STOP_COLORS = {
  'NDF': '#43e97b',
  'Notre Dame des Fleurs': '#43e97b',
  'Madeleine': '#6c63ff',
  'P.-Lomb.': '#f7971e',
  'Pie Lombard': '#f7971e',

  'lycée': '#ffeaa7',

  'Départ': '#b2bec3',
};

function stopColor(lieu) {
  for (const [k,v] of Object.entries(STOP_COLORS)) {
    if (lieu && lieu.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return '#8b8fa8';
}

function getInitials(name) {
  return name.split(' ').map(w => w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
}

// Returns "Prénom N." with first letter of last name
function childLabel(prenom) {
  const c = DATA.children.find(x => x.prenom === prenom);
  if (!c || !c.nom || c.nom === 'nan') return prenom;
  const initial = c.nom.trim()[0].toUpperCase();
  return prenom + ' ' + initial + '.';
}

function schoolBadge(ecole) {
  if (!ecole) return '';
  if (ecole.includes('primaire')) return '<span class="badge badge-primaire">🎒 Primaire</span>';
  if (ecole.includes('coll')) return '<span class="badge badge-college">📚 Collège</span>';
  return '<span class="badge badge-lycee">🎓 Lycée</span>';
}

function dirBadge(dir) {
  if (dir === 'ALLER') return '<span class="badge badge-aller">➡ Aller</span>';

}

// ---- NAV ----
function switchTab(tab) {
  ['chauffeur','enfant','planning','admin'].forEach(t => {
    document.getElementById('screen-' + t).classList.toggle('active', t === tab);
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'planning') {
    if (!document.querySelector('#day-tabs-planning .day-tab')) {
      initPlanning();
    } else {
      // Re-render the currently active day to pick up any data changes
      const activeTab = document.querySelector('#day-tabs-planning .day-tab.active');
      if (activeTab) {
        const idx = [...document.querySelectorAll('#day-tabs-planning .day-tab')].indexOf(activeTab);
        if (idx >= 0) renderPlanning(DAYS[idx].sheet, DAYS[idx].date);
      }
    }
  }
  if (tab === 'chauffeur' && !document.querySelector('#day-tabs-driver .day-tab')) initDriverDayTabs();
  if (tab === 'admin') renderAdminHome();
}

function initDriverDayTabs() {
  const container = document.getElementById('day-tabs-driver');
  if (!container) return;
  if (container.children.length) return;
  const todayIdx = getTodayIndex();
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === todayIdx ? ' active' : '');
    btn.textContent = d.label;
    btn.onclick = () => {
      container.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDayRides(d.sheet, d.date);
    };
    container.appendChild(btn);
  });
  renderDayRides(DAYS[todayIdx].sheet, DAYS[todayIdx].date);
  // Scroll active tab into view
  setTimeout(() => container.querySelectorAll('.day-tab')[todayIdx]?.scrollIntoView({inline:'center', behavior:'smooth'}), 50);
}

function renderDayRides(sheet, dateLabel) {
  const rides = DATA.rides.filter(r => r.sheet === sheet && r.enfants.length > 0);
  const container = document.getElementById('day-rides');
  if (!rides.length) { container.innerHTML = '<div class="empty"><div class="empty-emoji">🛣️</div><div class="empty-text">Aucun trajet ce jour</div></div>'; return; }

  let html = `<div style="font-size:16px;font-weight:700;margin-bottom:12px;color:var(--text)">${dateLabel}</div>`;
  
  const parseHeure = h => { if (!h) return 9999; const m = (h+'').replace('h',':').match(/(\d+):?(\d*)/); return m ? parseInt(m[1])*60+(parseInt(m[2])||0) : 9999; };
  const lieuOrder = l => { if (!l) return 99; const ll=l.toLowerCase(); if (ll.includes('ndf')||ll.includes('notre dame')) return 0; if (ll.includes('madeleine')) return 1; if (ll.includes('lomb')||ll.includes('pie')) return 2; if (ll.includes('courm')) return 3; return 4; };
  const aller = rides.filter(r => r.direction === 'ALLER').sort((a,b) => { const ta=parseHeure(a.time_group),tb=parseHeure(b.time_group); if (ta!==tb) return ta-tb; const la=lieuOrder(a.lieu),lb=lieuOrder(b.lieu); if (la!==lb) return la-lb; return parseHeure(a.heure)-parseHeure(b.heure); });
  const retour = rides.filter(r => r.direction === 'RETOUR');
  
  if (aller.length) {
    html += '<div class="divider">Aller</div>';
    aller.forEach(r => { html += rideCardHtml(r, true); });
  }
  if (retour.length) {
    html += '<div class="divider">Retour</div>';
    retour.forEach(r => { html += rideCardHtml(r, true); });
  }
  container.innerHTML = html;
}

function getCapacityInfo(r) {
  const places = r.places || 4;
  const taken = r.enfants.length;
  const free = places - taken;
  let color, label, emoji;
  if (free <= 0) {
    color = '#ff6584'; label = 'Complet'; emoji = '🔴';
  } else if (free === 1) {
    color = '#f7971e'; label = `1 place restante`; emoji = '🟠';
  } else {
    color = '#43e97b'; label = `${free} places libres`; emoji = '🟢';
  }
  const dots = Array.from({length: places}, (_, i) =>
    `<div style="width:10px;height:10px;border-radius:50%;background:${i < taken ? '#6c63ff' : (free<=0?'#ff6584':'#43e97b')};opacity:${i < taken ? 1 : 0.35};"></div>`
  ).join('');
  return { color, label, emoji, dots, free, taken, places };
}

function rideCardHtml(r, showDriver = false) {
  const color = stopColor(r.lieu);
  const kids = r.enfants.map(k => `<div class="kid-chip"><span class="emoji">👦</span>${childLabel(k)}</div>`).join('');
  const heure = r.heure || r.time_group || '';
  const cap = getCapacityInfo(r);
  return `
  <div class="ride-card" style="border-left:3px solid ${cap.color};">
    <div class="ride-header">
      <div>
        <div class="ride-day">${r.direction === 'ALLER' ? '➡ Aller' : '⬅ Retour'}</div>
        <div class="ride-time">${heure}</div>
        <div class="ride-time-group">${r.time_group !== r.heure ? 'Arrivée : ' + r.time_group : ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${r.direction === 'ALLER' ? '<span class="badge badge-aller">Aller</span>' : '<span class="badge badge-retour">Retour</span>'}
        <div style="display:flex;align-items:center;gap:4px;background:${cap.color}22;padding:3px 8px;border-radius:20px;">
          <span style="font-size:11px;">${cap.emoji}</span>
          <span style="font-size:11px;font-weight:700;color:${cap.color};">${cap.label}</span>
        </div>
        <div style="display:flex;gap:3px;align-items:center;">${cap.dots}</div>
      </div>
    </div>
    <div class="ride-location">
      <div class="location-dot" style="color:${color};background:${color}"></div>
      <div>
        <div class="location-text">${r.lieu || '—'}</div>
        <div class="location-sub">${r.direction === 'ALLER' ? 'Point de départ' : 'Point de RDV'}</div>
      </div>
    </div>
    ${showDriver ? `<div class="driver-chip"><div class="driver-avatar">${getInitials(r.chauffeur)}</div>${r.chauffeur}</div>` : ''}
    ${r.enfants.length ? `<div class="kids-row">${kids}</div>` : '<div class="no-kids">Aucun enfant assigné</div>'}
  </div>`;
}

function loadDriverRides(driver) {
  const container = document.getElementById('driver-rides');
  if (!driver) { container.innerHTML = ''; return; }
  
  const parseHeure = h => { if (!h) return 9999; const m = h.replace(/[h:]/,':').match(/(\d+):?(\d*)/); return m ? parseInt(m[1])*60+(parseInt(m[2])||0) : 9999; };
  const visibleSheets = new Set(DAYS.map(d => d.sheet));
  const allRides = DATA.rides.filter(r => r.chauffeur === driver && visibleSheets.has(r.sheet));
  const rides = allRides.filter(r => r.enfants.length > 0);
  if (!allRides.length) {
    container.innerHTML = '<div class="empty"><div class="empty-emoji">🚗</div><div class="empty-text">Aucun trajet trouvé</div></div>';
    return;
  }

  // Total kids transported (only rides with children, visible days only)
  const totalKids = rides.reduce((acc, r) => acc + r.enfants.length, 0);
  
  let html = `
    <div class="info-block" style="margin-bottom:16px;">
      <div class="info-icon" style="background:rgba(108,99,255,0.15);">🚗</div>
      <div>
        <div class="info-label">Trajets planifiés</div>
        <div class="info-value">${rides.length} trajet${rides.length>1?'s':''} · ${totalKids} enfant${totalKids>1?'s':''} transporté${totalKids>1?'s':''}</div>
      </div>
    </div>`;

  // Group by day
  const byDay = {};
  rides.forEach(r => {
    if (!byDay[r.sheet]) byDay[r.sheet] = [];
    byDay[r.sheet].push(r);
  });

  const sortRides = arr => arr.slice().sort((a,b) => {
    const ph = h => { if (!h) return 9999; const m = (h+'').replace('h',':').match(/(\d+):?(\d*)/); return m ? parseInt(m[1])*60+(parseInt(m[2])||0) : 9999; };
    const lo = l => { if (!l) return 99; const ll=l.toLowerCase(); if (ll.includes('ndf')||ll.includes('notre dame')) return 0; if (ll.includes('madeleine')) return 1; if (ll.includes('lomb')||ll.includes('pie')) return 2; if (ll.includes('courm')) return 3; return 4; };
    if (a.direction === 'ALLER' && b.direction === 'ALLER') {
      const ta=ph(a.time_group),tb=ph(b.time_group); if (ta!==tb) return ta-tb;
      const la=lo(a.lieu),lb=lo(b.lieu); if (la!==lb) return la-lb;
      return ph(a.heure)-ph(b.heure);
    }
    return 0;
  });
  DAYS.forEach(d => {
    if (!byDay[d.sheet]) return;
    html += `<div class="section-title">${d.date}</div>`;
    sortRides(byDay[d.sheet]).forEach(r => { html += rideCardHtml(r, false); });
  });

  container.innerHTML = html;
}

function renderPlanning(sheet, dateLabel) {
  const rides = DATA.rides.filter(r => r.sheet === sheet);
  const container = document.getElementById('planning-content');
  
  if (!rides.length) {
    container.innerHTML = '<div class="empty"><div class="empty-emoji">🗓️</div><div class="empty-text">Aucun trajet planifié</div></div>';
    return;
  }

  let html = `<div style="font-size:15px;font-weight:700;margin-bottom:12px;">${dateLabel}</div>`;

  const ph = h => { if (!h) return 9999; const m = (h+'').replace('h',':').match(/(\d+):?(\d*)/); return m ? parseInt(m[1])*60+(parseInt(m[2])||0) : 9999; };
  const lieuOrd = l => { if (!l) return 99; const ll=l.toLowerCase(); if (ll.includes('ndf')||ll.includes('notre dame')) return 0; if (ll.includes('madeleine')) return 1; if (ll.includes('lomb')||ll.includes('pie')) return 2; if (ll.includes('courm')) return 3; return 4; };
  const aller = rides.filter(r => r.direction === 'ALLER').sort((a,b) => { const ta=ph(a.time_group),tb=ph(b.time_group); if (ta!==tb) return ta-tb; const la=lieuOrd(a.lieu),lb=lieuOrd(b.lieu); if (la!==lb) return la-lb; return ph(a.heure)-ph(b.heure); });
  const retour = rides.filter(r => r.direction === 'RETOUR');
  
  if (aller.length) {
    html += '<div class="divider">Aller</div>';
    const byTime = {};
    aller.forEach(r => { if (!byTime[r.time_group]) byTime[r.time_group] = []; byTime[r.time_group].push(r); });
    const sortedKeys = Object.keys(byTime).sort((a,b) => ph(a)-ph(b));
    sortedKeys.forEach(t => {
      const rs = byTime[t].slice().sort((a,b) => { const la=lieuOrd(a.lieu),lb=lieuOrd(b.lieu); if (la!==lb) return la-lb; return ph(a.heure)-ph(b.heure); });
      html += `<div class="section-title">Créneau ${t}</div>`;
      rs.forEach(r => { if (r.enfants.length === 0) return; html += planningRideCardHtml(r); });
    });
  }

  if (retour.length) {
    html += '<div class="divider">Retour</div>';
    const byTime = {};
    retour.forEach(r => { if (!byTime[r.time_group]) byTime[r.time_group] = []; byTime[r.time_group].push(r); });
    Object.entries(byTime).forEach(([t, rs]) => {
      html += `<div class="section-title">RDV ${t}</div>`;
      rs.forEach(r => { if (r.enfants.length === 0) return; html += planningRideCardHtml(r); });
    });
  }

  container.innerHTML = html;
}

// GITHUB SYNC — lecture/écriture centralisée via API GitHub

// Proxy Netlify — le token est côté serveur, invisible
const PROXY_URL = '/.netlify/functions/github-proxy';

let _ghToken  = null;
let _ghSha    = null;
let _ghLoaded = false;

function getGhToken() { return _ghToken || localStorage.getItem('gh_token') || null; }
function setGhToken(t) { _ghToken = t; localStorage.setItem('gh_token', t); }

async function loadFromGitHub() {
  showLoadingBanner('⏳ Chargement des données...');
  try {
    const res = await fetch(PROXY_URL + '?t=' + Date.now());
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error('HTTP ' + res.status + ' ' + (errBody.message || errBody.error || ''));
    }
    const meta = await res.json();
    _ghSha = meta.sha;
    // Décodage base64 UTF-8 (gère les accents)
    const b64 = meta.content.replace(/\n/g, '');
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const jsonStr = new TextDecoder('utf-8').decode(bytes);
    const content = JSON.parse(jsonStr);
    applyGhData(content);
    _ghLoaded = true;
    hideLoadingBanner();
    return true;
  } catch(e) {
    console.error('loadFromGitHub:', e);
    hideLoadingBanner();
    showToast('⚠️ Erreur chargement: ' + e.message);
    return false;
  }
}

async function saveToGitHub(showMsg) {
  try {
    const data = {
      rides:           DATA.rides,
      children:        DATA.children,
      drivers:         getDriversData(),
      driver_children: getDC(),
      drivers_deleted: JSON.parse(localStorage.getItem('covoit_drivers_deleted') || '[]'),
      extra_days:      JSON.parse(localStorage.getItem('covoit_extra_days') || '[]'),
      equity_archive:  JSON.parse(localStorage.getItem('covoit_equity_archive') || '[]'),
      last_updated:    new Date().toISOString()
    };
    const body = {
      message: 'MAJ covoiturage ' + new Date().toLocaleDateString('fr-FR'),
      content: (() => {
        const str = JSON.stringify(data, null, 2);
        const bytes = new TextEncoder().encode(str);
        let binary = '';
        bytes.forEach(b => binary += String.fromCharCode(b));
        return btoa(binary);
      })(),
      sha:     _ghSha
    };
    const res = await fetch(PROXY_URL, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.message || err.error || 'HTTP ' + res.status); }
    const result = await res.json();
    _ghSha = result.content.sha;
    if (showMsg !== false) showToast('✅ Sauvegardé !');
    return true;
  } catch(e) {
    console.error('saveToGitHub:', e);
    showToast('❌ Erreur sauvegarde: ' + e.message);
    return false;
  }
}

function applyGhData(content) {
  if (content.rides)           { DATA.rides    = content.rides;    localStorage.setItem('covoit_rides',    JSON.stringify(content.rides)); }
  if (content.children)        { DATA.children = content.children; localStorage.setItem('covoit_children', JSON.stringify(content.children)); }
  if (content.drivers)         localStorage.setItem('covoit_drivers',          JSON.stringify(content.drivers));
  if (content.driver_children) localStorage.setItem('covoit_driver_children',  JSON.stringify(content.driver_children));
  if (content.drivers_deleted) localStorage.setItem('covoit_drivers_deleted',  JSON.stringify(content.drivers_deleted));
  if (content.extra_days && content.extra_days.length) {
    localStorage.setItem('covoit_extra_days', JSON.stringify(content.extra_days));
    content.extra_days.forEach(function(d) {
      if (!DAYS.find(function(x) { return x.sheet === d.sheet; })) DAYS.push(d);
    });
  }
  if (content.equity_archive) {
    localStorage.setItem('covoit_equity_archive', JSON.stringify(content.equity_archive));
  }
}

function renderAdminEquityTable() {
  const container = document.getElementById('asec-recap');
  if (!container) return;

  // ── Helpers ──────────────────────────────────────────────────────────────
  const norm = s => (s||'').trim().toLowerCase();
  const lastNameTokens = s => s.trim().split(' ').filter(w => w === w.toUpperCase() && w.length > 1);

  // Récupérer l'archive cumulée (stockée dans localStorage covoit_equity_archive)
  let archive = [];
  try { archive = JSON.parse(localStorage.getItem('covoit_equity_archive') || '[]'); } catch(e) {}

  // Récupérer les trajets courants non encore archivés
  const allRides = getRidesData();
  const archivedIds = new Set(archive.map(a => a.id));
  // Ajouter les trajets d'aujourd'hui passés (avant 20h = déjà archivables si date < aujourd'hui)
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const cutoff20h = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 20, 0, 0);

  // Archiver automatiquement les trajets des jours passés (ou du jour si > 20h)
  let newArchived = 0;
  allRides.forEach(r => {
    if (archivedIds.has(r.id)) return;
    const day = DAYS.find(d => d.sheet === r.sheet);
    if (!day) return;
    const rideDate = day.dateObj;
    const archivable = rideDate < todayMidnight || (
      rideDate.toDateString() === now.toDateString() && now >= cutoff20h
    );
    if (archivable) {
      archive.push({ id: r.id, sheet: r.sheet, chauffeur: r.chauffeur.trim(),
                     enfants: r.enfants, places: r.places || 4, date: rideDate.toISOString() });
      newArchived++;
    }
  });
  if (newArchived > 0) {
    localStorage.setItem('covoit_equity_archive', JSON.stringify(archive));
    saveToGitHub(false);
  }

  // Combiner archive + trajets d'aujourd'hui non encore archivés pour le calcul
  const todayRides = allRides.filter(r => {
    const day = DAYS.find(d => d.sheet === r.sheet);
    return day && day.dateObj.toDateString() === now.toDateString();
  });
  const allForCalc = [...archive];
  todayRides.forEach(r => {
    if (!archivedIds.has(r.id)) {
      allForCalc.push({ id: r.id, sheet: r.sheet, chauffeur: r.chauffeur.trim(),
                        enfants: r.enfants, places: r.places || 4, date: now.toISOString() });
    }
  });

  // ── Union-Find pour regrouper les familles ────────────────────────────────
  const rideDrivers = [...new Set(allForCalc.map(r => r.chauffeur))];
  const lnIndex = {};
  rideDrivers.forEach(d => lastNameTokens(d).forEach(ln => {
    lnIndex[ln] = lnIndex[ln] || []; lnIndex[ln].push(d);
  }));

  function matchDriver(p) {
    if (!p || p === 'nan') return null;
    const pn = norm(p);
    const exact = rideDrivers.find(d => norm(d) === pn);
    if (exact) return exact;
    const pw = p.trim().split(' ').filter(w => w.length > 2).map(w => norm(w));
    const lnMatches = {};
    pw.forEach(w => (lnIndex[w.toUpperCase()]||[]).forEach(d => { lnMatches[d] = (lnMatches[d]||0)+1; }));
    if (Object.keys(lnMatches).length) return Object.entries(lnMatches).sort((a,b)=>b[1]-a[1])[0][0];
    const wm = rideDrivers.map(d=>({d,score:pw.filter(w=>norm(d).includes(w)).length})).filter(x=>x.score>0);
    if (wm.length) return wm.sort((a,b)=>b.score-a.score)[0].d;
    return null;
  }

  const uf = {};
  const find = k => { if (!uf[k]||uf[k]===k){uf[k]=k;return k;} return uf[k]=find(uf[k]); };
  const union = (a,b) => { a=find(a);b=find(b);if(a!==b)uf[b]=a; };

  const childToDrivers = {};
  DATA.children.forEach(c => {
    const matched = [c.chauffeur1, c.chauffeur2].map(ch=>matchDriver(ch)).filter(Boolean);
    const uniq = [...new Set(matched)];
    childToDrivers[c.prenom] = uniq;
    uniq.forEach(d => find(d));
    if (uniq.length === 2) union(uniq[0], uniq[1]);
  });
  rideDrivers.forEach(d => find(d));

  // ── Stats par famille ─────────────────────────────────────────────────────
  // offertes  = nb enfants d'AUTRES familles transportés par cette famille
  // utilisees = nb fois où un enfant de cette famille est dans la voiture d'UNE AUTRE famille
  const famStats = {};
  const getFam = k => {
    const fid = find(k);
    if (!famStats[fid]) famStats[fid] = {
      drvSet: new Set(), childSet: new Set(),
      trajets: 0, offertes: 0, utilisees: 0
    };
    return famStats[fid];
  };

  DATA.children.forEach(c => {
    childToDrivers[c.prenom].forEach(d => getFam(d).childSet.add(c.prenom));
  });
  rideDrivers.forEach(d => getFam(d).drvSet.add(d));

  allForCalc.forEach(r => {
    const fam = getFam(r.chauffeur);
    fam.trajets++;
    r.enfants.forEach(prenom => {
      if (fam.childSet.has(prenom)) {
        // enfant de la famille dans sa propre voiture → neutre
      } else {
        fam.offertes++; // place offerte à un enfant d'une autre famille
        // trouver la famille de cet enfant et incrémenter ses utilisées
        const childFam = childToDrivers[prenom];
        if (childFam && childFam.length > 0) {
          const cf = getFam(childFam[0]);
          if (find(childFam[0]) !== find(r.chauffeur)) cf.utilisees++;
        }
      }
    });
  });

  // ── Rendu ─────────────────────────────────────────────────────────────────
  const lastNames = fid => [...new Set([...famStats[fid].drvSet]
    .flatMap(d => lastNameTokens(d).map(ln => ln.charAt(0)+ln.slice(1).toLowerCase())))].join('/');

  const sorted = Object.entries(famStats)
    .map(([fid, s]) => ({ fid, s, label: lastNames(fid) }))
    .filter(x => x.label && x.s.childSet.size > 0)
    .sort((a,b) => (b.s.offertes - b.s.utilisees) - (a.s.offertes - a.s.utilisees));

  const archiveDays = archive.length ? (() => {
    const dates = [...new Set(archive.map(a => a.date.slice(0,10)))].sort();
    return dates.length + ' jour' + (dates.length > 1 ? 's' : '') + ' archivé' + (dates.length > 1 ? 's' : '');
  })() : 'aucun jour archivé';

  let out = `
  <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
    <span>📊 Cumul depuis le début · ${archiveDays}</span>
    <button onclick="resetEquityArchive()" style="font-size:10px;padding:3px 8px;background:rgba(255,100,100,0.15);border:1px solid rgba(255,100,100,0.3);border-radius:6px;color:#ff6584;cursor:pointer;">🗑 Reset</button>
  </div>
  <div style="overflow-x:auto;">
  <table style="width:100%;border-collapse:collapse;font-size:12px;">
    <thead>
      <tr style="color:var(--text-muted);border-bottom:2px solid var(--border);">
        <th style="text-align:left;padding:8px 6px;">Famille</th>
        <th style="text-align:center;padding:8px 4px;" title="Places offertes aux autres familles">🟢 Offertes</th>
        <th style="text-align:center;padding:8px 4px;" title="Places utilisées chez d'autres familles">🔴 Utilisées</th>
        <th style="text-align:center;padding:8px 4px;" title="Solde = offertes - utilisées">⚖️ Solde</th>
        <th style="text-align:left;padding:8px 6px;">Enfants</th>
      </tr>
    </thead><tbody>`;

  sorted.forEach(({ fid, s, label }) => {
    const solde = s.offertes - s.utilisees;
    const soldeColor = solde > 0 ? '#43e97b' : solde < 0 ? '#ff6584' : 'var(--text-muted)';
    const soldeSign = solde > 0 ? '+' : '';
    const badges = [...s.childSet].sort().map(p =>
      `<span style="background:rgba(108,99,255,0.2);border-radius:4px;padding:1px 5px;font-size:10px;">${p}</span>`
    ).join(' ');
    out += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
      <td style="padding:8px 6px;font-weight:700;font-size:11px;">Famille ${label}</td>
      <td style="text-align:center;padding:8px 4px;color:#43e97b;font-weight:700;">${s.offertes}</td>
      <td style="text-align:center;padding:8px 4px;color:#ff6584;font-weight:700;">${s.utilisees}</td>
      <td style="text-align:center;padding:8px 4px;font-weight:800;font-size:14px;color:${soldeColor};">${soldeSign}${solde}</td>
      <td style="padding:6px 6px;"><div style="display:flex;flex-wrap:wrap;gap:3px;">${badges}</div></td>
    </tr>`;
  });

  out += `</tbody></table></div>
  <div style="margin-top:10px;font-size:11px;color:var(--text-muted);line-height:1.6;">
    🟢 <b>Offertes</b> : places données à des enfants d'autres familles<br>
    🔴 <b>Utilisées</b> : places prises dans les voitures d'autres familles
  </div>`;

  container.innerHTML = out;
}

function resetEquityArchive() {
  const pwd = prompt('Mot de passe admin :');
  if (pwd !== 'fenelon2026') { if (pwd !== null) alert('Mot de passe incorrect.'); return; }
  if (!confirm('Remettre le compteur d\'équité à zéro ?')) return;
  localStorage.removeItem('covoit_equity_archive');
  saveToGitHub(false);
  renderAdminEquityTable();
  showToast('✅ Archive d\'équité réinitialisée');
}

// Driver data stored separately in localStorage
function getDriversData() {
  let drivers;
  try {
    const saved = localStorage.getItem('covoit_drivers');
    if (saved) {
      const blacklistCheck = JSON.parse(localStorage.getItem('covoit_drivers_deleted') || '[]');
      drivers = JSON.parse(saved).filter(d => !blacklistCheck.includes(d.nom));
    }
  } catch(e) {}
  if (!drivers) {
    // Seed from PREFILLED_DRIVERS
    const driversMap = {};
    PREFILLED_DRIVERS.forEach(d => { driversMap[d.nom] = d; });
    const bl = JSON.parse(localStorage.getItem('covoit_drivers_deleted') || '[]');
    DATA.rides.forEach(r => {
      if (r.chauffeur && !driversMap[r.chauffeur] && !bl.includes(r.chauffeur)) {
        driversMap[r.chauffeur] = { nom: r.chauffeur, tel: '', places: '', email: '', note: '', famille: '' };
      }
    });
    drivers = Object.values(driversMap);
  }
  // Dédupliquer : garder la fiche la plus complète pour chaque nom normalisé
  const seen = new Map();
  drivers.forEach(d => {
    const key = d.nom.trim().toLowerCase().replace(/\s+/g,' ');
    if (!seen.has(key)) {
      seen.set(key, d);
    } else {
      // Fusionner : garder les champs non vides
      const existing = seen.get(key);
      const merged = { ...existing };
      ['tel','places','email','note','famille'].forEach(f => {
        if (!merged[f] && d[f]) merged[f] = d[f];
      });
      // Garder le nom le plus long (souvent le mieux écrit)
      if (d.nom.length > existing.nom.length) merged.nom = d.nom;
      seen.set(key, merged);
    }
  });
  return Array.from(seen.values());
}

  localStorage.setItem('covoit_drivers', JSON.stringify(drivers));
}

function saveDriverForm() {
  const nom = document.getElementById('df-nom').value.trim();
  if (!nom) { alert('Le nom est requis.'); return; }
  const oldName = document.getElementById('df-oldnom').value;
  const drivers = getDriversData();
  const knownNames = new Set(drivers.map(d => d.nom));
  DATA.rides.forEach(r => { if (r.chauffeur && !knownNames.has(r.chauffeur)) { drivers.push({ nom: r.chauffeur, tel: '', places: '', email: '', note: '', famille: '' }); knownNames.add(r.chauffeur); }});

  const driverData = {
    nom,
    tel: document.getElementById('df-tel').value.trim(),
    places: document.getElementById('df-places').value.trim(),
    email: document.getElementById('df-email').value.trim(),
    note: document.getElementById('df-note').value.trim(),
    famille: document.getElementById('df-famille').value.trim(),
  };

  if (oldName) {
    const i = drivers.findIndex(d => d.nom === oldName);
    if (i >= 0) drivers[i] = {...drivers[i], ...driverData};
    else drivers.push(driverData);
    if (oldName !== nom) {
      DATA.rides.forEach(r => { if (r.chauffeur === oldName) r.chauffeur = nom; });
      DATA.children.forEach(c => {
        if (c.chauffeur1 === oldName) c.chauffeur1 = nom;
        if (c.chauffeur2 === oldName) c.chauffeur2 = nom;
      });
      saveData();
    }
  } else {
    const i = drivers.findIndex(d => d.nom === nom);
    if (i >= 0) drivers[i] = {...drivers[i], ...driverData};
    else drivers.push(driverData);
  }
  saveDriversData(drivers);

  // Si ce chauffeur était dans la blacklist, l'en retirer (réactivation explicite)
  let blacklist = JSON.parse(localStorage.getItem('covoit_drivers_deleted') || '[]');
  const blIdx = blacklist.indexOf(nom);
  if (blIdx >= 0) blacklist.splice(blIdx, 1);
  // Aussi retirer l'ancien nom si renommé
  if (oldName && oldName !== nom) {
    const blOldIdx = blacklist.indexOf(oldName);
    if (blOldIdx >= 0) blacklist.splice(blOldIdx, 1);
  }
  localStorage.setItem('covoit_drivers_deleted', JSON.stringify(blacklist));

  // Mettre à jour DRIVER_CHILDREN depuis les checkboxes
  const checkboxes = document.querySelectorAll('#df-children-list input[type=checkbox]');
  if (checkboxes.length > 0) {
    const dc = getDC();
    const selected = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
    dc[nom] = selected;
    // Nettoyer l'ancien nom si renommé
    if (oldName && oldName !== nom && dc[oldName] !== undefined) delete dc[oldName];
    saveDC(dc);
  }

  closeModal();
  renderAdminDriversList();
  refreshAll();
  showToast('✅ Chauffeur enregistré !');
  saveToGitHub(false);
}

function deleteDriver(driverName) {
  if (!confirm('Supprimer ' + driverName + ' ? Ses trajets ne seront PAS supprimés.')) return;
  // Charger et forcer la sauvegarde complète AVANT suppression
  // pour que le localStorage soit initialisé avec toutes les fiches
  let drivers = getDriversData();
  // Si pas encore en localStorage, forcer la sauvegarde initiale
  if (!localStorage.getItem('covoit_drivers')) saveDriversData(drivers);
  // Recharger depuis localStorage maintenant qu'il est initialisé
  drivers = JSON.parse(localStorage.getItem('covoit_drivers') || '[]');
  const i = drivers.findIndex(d => d.nom === driverName);
  if (i >= 0) drivers.splice(i, 1);
  // Stocker aussi dans une liste noire pour éviter la recréation depuis les trajets
  let blacklist = [];
  try { blacklist = JSON.parse(localStorage.getItem('covoit_drivers_deleted') || '[]'); } catch(e) {}
  if (!blacklist.includes(driverName)) blacklist.push(driverName);
  localStorage.setItem('covoit_drivers_deleted', JSON.stringify(blacklist));
  saveDriversData(drivers);
  renderAdminDriversList();
  showToast('🗑️ Chauffeur supprimé');
  saveToGitHub(false);
}

function renderAdminRidesList(sheet, dateLabel) {
  const rides = DATA.rides.filter(r => r.sheet === sheet);
  const container = document.getElementById('admin-rides-list');
  let html = `<div style="font-size:15px;font-weight:700;margin-bottom:12px;">${dateLabel} <span class="counter">${rides.length} trajets</span></div>`;
  
  if (!rides.length) {
    html += '<div class="empty"><div class="empty-emoji">🛣️</div><div class="empty-text">Aucun trajet ce jour</div></div>';
    container.innerHTML = html; return;
  }

  const phA = h => { if (!h) return 9999; const m = (h+'').replace('h',':').match(/(\d+):?(\d*)/); return m ? parseInt(m[1])*60+(parseInt(m[2])||0) : 9999; };
  const loA = l => { if (!l) return 99; const ll=l.toLowerCase(); if (ll.includes('ndf')||ll.includes('notre dame')) return 0; if (ll.includes('madeleine')) return 1; if (ll.includes('lomb')||ll.includes('pie')) return 2; if (ll.includes('courm')) return 3; return 4; };
  const aller = rides.filter(r => r.direction === 'ALLER').sort((a,b) => { const ta=phA(a.time_group),tb=phA(b.time_group); if (ta!==tb) return ta-tb; const la=loA(a.lieu),lb=loA(b.lieu); if (la!==lb) return la-lb; return phA(a.heure)-phA(b.heure); });
  const retour = rides.filter(r => r.direction === 'RETOUR');

  function rideAdminRow(r) {
    const cap = getCapacityInfo(r);
    return `<div class="ride-card" style="position:relative;border-left:3px solid ${cap.color};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
            ${r.direction === 'ALLER' ? '<span class="badge badge-aller">➡ Aller</span>' : '<span class="badge badge-retour">⬅ Retour</span>'}
            <span style="font-weight:700;font-size:15px;">${r.heure || r.time_group}</span>
            <span style="font-size:13px;color:var(--text-muted);">${r.lieu || '—'}</span>
          </div>
          <div class="driver-chip" style="margin-bottom:6px;"><div class="driver-avatar" style="width:24px;height:24px;font-size:10px;">${getInitials(r.chauffeur)}</div>${r.chauffeur}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <div style="display:flex;gap:3px;">${cap.dots}</div>
            <span style="font-size:12px;font-weight:700;color:${cap.color};">${cap.emoji} ${cap.label}</span>
          </div>
          <div style="font-size:12px;color:var(--text-muted);">${r.enfants.length ? '👦 ' + r.enfants.join(', ') : 'Aucun enfant'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
          <button onclick="openRideForm('${r.id}')" style="background:rgba(108,99,255,0.15);border:none;color:var(--accent);padding:6px 10px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">✏️ Éditer</button>
          <button onclick="deleteRide('${r.id}')" style="background:rgba(255,101,132,0.15);border:none;color:#ff6584;padding:6px 10px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🗑 Suppr.</button>
        </div>
      </div>
    </div>`;
  }

  if (aller.length) { html += '<div class="divider">Aller</div>'; aller.forEach(r => { html += rideAdminRow(r); }); }
  if (retour.length) { html += '<div class="divider">Retour</div>'; retour.forEach(r => { html += rideAdminRow(r); }); }
  container.innerHTML = html;
}

          <div class="info-label" style="margin-bottom:6px;">Heure départ</div>

        </div>
        <div>

// Build child checkboxes, greying out already-assigned children
function refreshChildCheckboxes() {
  const sheet = document.getElementById('f-sheet')?.value;
  const direction = document.getElementById('f-direction')?.value;
  const grid = document.getElementById('child-checkboxes-grid');
  if (!grid) return;

  // Children already in another ride this day+direction (excluding current ride being edited)
  const alreadyTaken = new Set();
  DATA.rides
    .filter(r => r.sheet === sheet && r.direction === direction && r.id !== editingRideId)
    .forEach(r => r.enfants.forEach(e => alreadyTaken.add(e)));

  // Currently checked children (preserve selections across refresh)
  const currentlyChecked = new Set(
    [...(grid.querySelectorAll('input[name="child_check"]:checked') || [])].map(cb => cb.value)
  );
  // Also include children already in this ride
  const ride = editingRideId ? DATA.rides.find(r => r.id === editingRideId) : null;
  if (ride) ride.enfants.forEach(e => currentlyChecked.add(e));

  const allChildren = [...DATA.children].sort((a,b)=>a.prenom.localeCompare(b.prenom,'fr')).map(c => c.prenom);
  const free = allChildren.filter(c => !alreadyTaken.has(c));
  const taken = allChildren.filter(c => alreadyTaken.has(c));

  let html = '';

  // Free children — checkable
  free.forEach(c => {
    const checked = currentlyChecked.has(c);
    const safeId = 'lbl-' + c.replace(/\s/g,'_');
    html += `<label style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface2);border-radius:8px;cursor:pointer;border:1px solid ${checked ? 'var(--accent)' : 'var(--border)'};" id="${safeId}">
      <input type="checkbox" name="child_check" value="${c}" ${checked ? 'checked' : ''} onchange="updateChildLabel(this)">
      <span>${childLabel(c)}</span>
    </label>`;
  });

  // Already-assigned children — greyed out, not checkable
  taken.forEach(c => {
    html += `<label style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;cursor:not-allowed;border:1px solid var(--border);opacity:0.45;" title="Déjà assigné à un trajet ce jour">
      <span style="font-size:14px;">🔒</span>
      <span style="text-decoration:line-through;color:var(--text-muted);font-size:13px;">${childLabel(c)}</span>
    </label>`;
  });

  grid.innerHTML = html;

  // Show/hide legend
  const legend = document.getElementById('child-assign-legend');
  if (legend) legend.style.display = taken.length ? '' : 'none';
}

function setDir(dir) {
  document.getElementById('f-direction').value = dir;
  document.getElementById('dir-aller').classList.toggle('active', dir === 'ALLER');
  document.getElementById('dir-retour').classList.toggle('active', dir === 'RETOUR');
  // Update lieu options based on direction
  const lieuxAller = ['NDF','Madeleine','Pie Lombard','Courmettes'];
  const lieuxRetour = ['RP du Sud','P. Mairie','Bureau CPE','S. des Profs','Gare SNCF','parvis primaire','lycée'];
  const lieuSel = document.getElementById('f-lieu');
  if (lieuSel) {
    const current = lieuSel.value;
    const lieux = dir === 'ALLER' ? lieuxAller : lieuxRetour;
    lieuSel.innerHTML = lieux.map(l => `<option value="${l}" ${l === current ? 'selected' : ''}>${l}</option>`).join('');
  }
  refreshChildCheckboxes();
}

function updateChildLabel(cb) {
  const lbl = document.getElementById('lbl-' + cb.value.replace(/\s/g,'_'));
  if (lbl) lbl.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border)';
  checkCapacityWarning();
}

function checkCapacityWarning() {
  const places = parseInt(document.getElementById('f-places')?.value) || 4;
  const checked = document.querySelectorAll('input[name="child_check"]:checked').length;
  const warning = document.getElementById('capacity-warning');
  const saveBtn = document.querySelector('[onclick="saveRideForm()"]');
  const over = checked > places;
  if (warning) warning.style.display = over ? '' : 'none';
  if (warning) warning.textContent = over ? '⚠️ ' + checked + ' enfants sélectionnés pour ' + places + ' place' + (places > 1 ? 's' : '') + ' — réduisez le nombre de passagers' : '';
  if (saveBtn) { saveBtn.style.opacity = over ? '0.4' : '1'; saveBtn.style.cursor = over ? 'not-allowed' : 'pointer'; }
}

function saveRideForm() {
  const sheet = document.getElementById('f-sheet').value;
  const direction = document.getElementById('f-direction').value;
  const heure = document.getElementById('f-heure').value;
  const time_group = document.getElementById('f-timegroup').value;
  const lieu = document.getElementById('f-lieu').value;
  let chauffeur = document.getElementById('f-chauffeur').value;
  if (chauffeur === '__new__') chauffeur = document.getElementById('f-new-chauffeur').value.trim();
  const enfants = [...document.querySelectorAll('input[name="child_check"]:checked')].map(cb => cb.value);
  const places = parseInt(document.getElementById('f-places').value) || 4;

  if (!chauffeur || chauffeur === '') { alert('Veuillez sélectionner ou saisir un chauffeur.'); return; }
  if (enfants.length > places) { alert('⚠️ ' + enfants.length + ' enfants sélectionnés pour ' + places + ' place' + (places > 1 ? 's' : '') + '.\nRéduisez le nombre de passagers avant d\'enregistrer.'); return; }

  const dayInfo = DAYS.find(d => d.sheet === sheet);
  const dayParts = dayInfo ? dayInfo.date.split(' ') : ['','',''];

  if (editingRideId) {
    const idx = DATA.rides.findIndex(r => r.id === editingRideId);
    if (idx >= 0) {
      DATA.rides[idx] = { ...DATA.rides[idx], sheet, direction, heure, time_group, lieu, chauffeur, enfants, places };
    }
  } else {
    DATA.rides.push({ id: genId(), sheet, day: dayParts[1]||'', month: dayParts[2]||'', direction, heure, time_group, lieu, chauffeur, enfants, places });
  }
  saveData();
  closeModal();
  // Refresh the current admin day view
  const activeTab = document.querySelector('#admin-day-tabs .day-tab.active');
  if (activeTab) {
    const idx = [...document.querySelectorAll('#admin-day-tabs .day-tab')].indexOf(activeTab);
    renderAdminRidesList(DAYS[idx].sheet, DAYS[idx].date);
  }
  // Also refresh driver/planning if needed
  refreshAll();
  showToast('✅ Trajet enregistré !');
  saveToGitHub(false);
}

function deleteRide(rideId) {
  if (!confirm('Supprimer ce trajet ?')) return;
  DATA.rides = DATA.rides.filter(r => r.id !== rideId);
  saveData();
  const activeTab = document.querySelector('#admin-day-tabs .day-tab.active');
  if (activeTab) {
    const idx = [...document.querySelectorAll('#admin-day-tabs .day-tab')].indexOf(activeTab);
    renderAdminRidesList(DAYS[idx].sheet, DAYS[idx].date);
  }
  refreshAll();
  showToast('🗑️ Trajet supprimé');
  saveToGitHub(false);
}

// ---- CHILDREN ADMIN ----

  const container = document.getElementById('admin-children-list');
  if (!container) return;
  let html = `<div style="font-size:15px;font-weight:700;margin-bottom:12px;">Enfants enregistrés <span class="counter">${DATA.children.length}</span></div>`;
  DATA.children.forEach((c, idx) => {
    const p1 = c.parent1_nom || (c.chauffeur1 !== 'nan' ? c.chauffeur1 : '') || '';
    const p2 = c.parent2_nom || (c.chauffeur2 !== 'nan' ? c.chauffeur2 : '') || '';
    const tel = c.tel && c.tel !== 'nan' ? c.tel : '';
    html += `<div class="ride-card" style="display:flex;align-items:center;gap:12px;justify-content:space-between;">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;">${c.prenom} <span style="color:var(--text-muted);font-weight:400;">${c.nom||''}</span>${tel ? ` <span style="font-size:11px;color:var(--text-muted);">· 📱 ${tel}</span>` : ''}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${c.arret||''} · ${c.classe||''} · ${c.ecole||''}</div>
        <div style="font-size:11px;color:var(--accent2);margin-top:2px;">${p1 ? '🚗 '+p1 : ''}${p1&&p2?' · ':''}${p2 ? p2 : ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button onclick="openChildForm(${idx})" style="background:rgba(108,99,255,0.15);border:none;color:var(--accent);padding:6px 10px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">✏️</button>
        <button onclick="deleteChild(${idx})" style="background:rgba(255,101,132,0.15);border:none;color:#ff6584;padding:6px 10px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🗑</button>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function buildDriverOpts(selectedNom) {
  // Tous les chauffeurs : ceux des trajets + ceux sauvegardés (inclut les nouvellement créés)
  var allDrivers = getDriversData().map(function(d){ return d.nom; });
  DATA.rides.forEach(function(r){ if (r.chauffeur && !allDrivers.includes(r.chauffeur)) allDrivers.push(r.chauffeur); });
  allDrivers.sort(function(a,b){ return a.localeCompare(b,'fr'); });
  var opts = '<option value="">— choisir —</option>';
  allDrivers.forEach(function(n) {
    opts += '<option value="' + escHtml(n) + '"' + (n === selectedNom ? ' selected' : '') + '>' + escHtml(n) + '</option>';
  });
  return opts;
}

function renderChildParentsSection(p1nom, p1tel, p2nom, p2tel, editMode) {
  var h = '<div style="background:rgba(0,210,255,0.05);border:1px solid rgba(0,210,255,0.2);border-radius:12px;padding:10px 12px;margin-bottom:14px;">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
  h += '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">🚗 Parents chauffeurs</div>';
  if (!editMode) {
    h += '<button id="btn-edit-parents" type="button" style="background:rgba(0,210,255,0.15);border:none;color:#00d2ff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif;">✏️ Modifier</button>';
  } else {
    h += '<span style="font-size:11px;color:#00d2ff;font-weight:600;">Sélection des parents</span>';
  }
  h += '</div>';
  if (!editMode) {
    // Vue lecture : badges cliquables
    var hasBadge = false;
    [{ nom: p1nom, tel: p1tel, label: 'Parent 1' }, { nom: p2nom, tel: p2tel, label: 'Parent 2' }].forEach(function(p) {
      if (!p.nom || p.nom === 'nan') return;
      hasBadge = true;
      var drv = getDriversData().find(function(d){ return d.nom === p.nom; }) || {};
      var drvIdx = getDriversData().findIndex(function(d){ return d.nom === p.nom; });
      var tel = drv.tel || p.tel || '';
      h += '<div style="display:flex;align-items:center;gap:8px;background:rgba(0,210,255,0.08);border:1px solid rgba(0,210,255,0.2);border-radius:10px;padding:8px 12px;margin-bottom:6px;">';
      h += '<div class="driver-avatar" style="width:28px;height:28px;font-size:11px;flex-shrink:0;">' + getInitials(p.nom) + '</div>';
      h += '<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:700;">' + escHtml(p.nom) + '</div>';
      if (tel) h += '<div style="font-size:11px;color:var(--text-muted);">📞 ' + escHtml(tel) + '</div>';
      h += '</div><span style="font-size:10px;color:var(--text-muted);background:var(--surface2);padding:2px 6px;border-radius:6px;">' + p.label + '</span>';
      h += '</div>';
    });
    if (!hasBadge) h += '<div style="font-size:12px;color:var(--text-muted);font-style:italic;">Aucun parent renseigné</div>';
  } else {
    // Vue édition : sélecteurs + champs nom/tel
    ['1','2'].forEach(function(n) {
      var selNom  = n === '1' ? p1nom : p2nom;
      var selTel  = n === '1' ? p1tel : p2tel;
      var label   = n === '1' ? 'Parent 1 (chauffeur principal)' : 'Parent 2 (optionnel)';
      h += '<div style="background:var(--surface2);border-radius:10px;padding:10px;margin-bottom:8px;">';
      h += '<div class="info-label" style="margin-bottom:6px;">' + label + '</div>';
      h += '<select id="cf-chauf' + n + '" class="search-input" style="padding-left:10px;margin-bottom:6px;" onchange="syncParent' + n + '(this.value)">' + buildDriverOpts(selNom) + '</select>';

      h += '<input id="cf-tel' + n + '" class="search-input" style="padding-left:14px;" value="' + escHtml(selTel || '') + '" placeholder="Tél. parent ' + n + '">';
      h += '</div>';
    });
  }
  h += '</div>';
  return h;
}

function openChildForm(idx) {
  editingChildId = idx;
  var c = (idx !== null && idx >= 0) ? DATA.children[idx] : null;
  var stops = ['Notre Dame des Fleurs','Madeleine','Pie Lombard','Courmettes','P. Mairie','Gare SNCF'];
  var stopOpts = stops.map(function(s){ return '<option value="' + escHtml(s) + '"' + (c && c.arret===s ? ' selected' : '') + '>' + escHtml(s) + '</option>'; }).join('');
  var ecoles = ['primaire','collège','lycée (incl. 3ème)'];
  var ecoleOpts = ecoles.map(function(e){ return '<option value="' + escHtml(e) + '"' + (c && c.ecole===e ? ' selected' : '') + '>' + escHtml(e) + '</option>'; }).join('');

  var p1nom = c ? (c.parent1_nom || c.chauffeur1 || '') : '';
  var p2nom = c ? (c.parent2_nom || c.chauffeur2 || '') : '';
  var p1tel = c ? (c.parent1_tel || (c.tel_chauf1 !== 'nan' ? c.tel_chauf1 : '') || '') : '';
  var p2tel = c ? (c.parent2_tel || (c.tel_chauf2 !== 'nan' ? c.tel_chauf2 : '') || '') : '';
  if (p1nom === 'nan') p1nom = '';
  if (p2nom === 'nan') p2nom = '';

  var prenom  = c ? c.prenom : '';
  var nom     = c ? (c.nom || '') : '';
  var tel     = c ? ((c.tel && c.tel !== 'nan') ? c.tel : '') : '';
  var famille = c ? (c.famille || '') : '';

  var mc = document.getElementById('admin-modal-content');
  var html = '';

  // En-tête
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">';
  html += '<div style="font-size:18px;font-weight:800;">' + (c ? '✏️ ' + escHtml(prenom) + ' ' + escHtml(nom) : '➕ Nouvel enfant') + '</div>';
  html += '<button onclick="closeModal()" style="background:var(--surface2);border:none;color:var(--text-muted);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;">×</button></div>';

  // Section parents (vue lecture par défaut)
  html += '<div id="cf-parents-section">' + renderChildParentsSection(p1nom, p1tel, p2nom, p2tel, false) + '</div>';

  // Champs identité enfant
  html += '<div style="display:flex;flex-direction:column;gap:12px;">';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  html += '<div><div class="info-label" style="margin-bottom:6px;">Prénom</div>';
  html += '<input id="cf-prenom" class="search-input" style="padding-left:14px;" value="' + escHtml(prenom) + '" placeholder="Prénom"></div>';
  html += '<div><div class="info-label" style="margin-bottom:6px;">Nom de famille</div>';
  html += '<input id="cf-nom" class="search-input" style="padding-left:14px;" value="' + escHtml(nom) + '" placeholder="Nom"></div></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  html += '<div><div class="info-label" style="margin-bottom:6px;">Classe</div>';
  html += '<input id="cf-classe" class="search-input" style="padding-left:14px;" value="' + escHtml(c ? c.classe : '') + '" placeholder="ex: 5I"></div>';
  html += '<div><div class="info-label" style="margin-bottom:6px;">École</div>';
  html += '<select id="cf-ecole" class="search-input" style="padding-left:14px;">' + ecoleOpts + '</select></div></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  html += '<div><div class="info-label" style="margin-bottom:6px;">Arrêt</div>';
  html += '<select id="cf-arret" class="search-input" style="padding-left:14px;">' + stopOpts + '</select></div>';
  html += '<div><div class="info-label" style="margin-bottom:6px;">Famille</div>';
  html += '<input id="cf-famille" class="search-input" style="padding-left:14px;" value="' + escHtml(famille || nom.toUpperCase()) + '" placeholder="ex: PEACOCK"></div></div>';
  html += '<div><div class="info-label" style="margin-bottom:6px;">Tél. enfant</div>';
  html += '<input id="cf-tel" class="search-input" style="padding-left:14px;" value="' + escHtml(tel) + '" placeholder="0612345678"></div>';
  html += '</div>';

  html += '<div style="display:flex;gap:10px;margin-top:20px;">';
  html += '<button onclick="closeModal()" style="flex:1;padding:14px;background:var(--surface2);border:none;border-radius:12px;color:var(--text-muted);font-family:Outfit,sans-serif;font-size:15px;font-weight:600;cursor:pointer;">Annuler</button>';
  html += '<button onclick="saveChildForm()" style="flex:2;padding:14px;background:linear-gradient(135deg,var(--accent3),var(--accent));border:none;border-radius:12px;color:white;font-family:Outfit,sans-serif;font-size:15px;font-weight:700;cursor:pointer;">💾 Enregistrer</button>';
  html += '</div>';

  mc.innerHTML = html;

  // Bouton Modifier parents
  var btnP = document.getElementById('btn-edit-parents');
  if (btnP) {
    btnP.addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('cf-parents-section').innerHTML = renderChildParentsSection(p1nom, p1tel, p2nom, p2tel, true);
    });
  }

  document.getElementById('admin-modal').style.display = 'block';
}


function syncParent1(drvName) {
  const el = document.getElementById('cf-nom1'); if (el) el.value = drvName;
  const drv = getDriversData().find(d => d.nom === drvName);
  const t = document.getElementById('cf-tel1'); if (t && drv && drv.tel) t.value = drv.tel;
}
function syncParent2(drvName) {
  const el = document.getElementById('cf-nom2'); if (el) el.value = drvName;
  const drv = getDriversData().find(d => d.nom === drvName);
  const t = document.getElementById('cf-tel2'); if (t && drv && drv.tel) t.value = drv.tel;
}

function saveChildForm() {
  const prenom = document.getElementById('cf-prenom').value.trim();
  const nom = document.getElementById('cf-nom').value.trim();
  if (!prenom) { alert('Le prénom est requis.'); return; }
  const p1nom = (document.getElementById('cf-nom1').value || '').trim() || document.getElementById('cf-chauf1').value || '';
  const p2nom = (document.getElementById('cf-nom2').value || '').trim() || document.getElementById('cf-chauf2').value || '';
  const p1tel = document.getElementById('cf-tel1').value.trim();
  const p2tel = document.getElementById('cf-tel2').value.trim();
  const famille = document.getElementById('cf-famille').value.trim();

  const child = {
    prenom, nom, famille,
    classe: document.getElementById('cf-classe').value.trim(),
    ecole: document.getElementById('cf-ecole').value,
    arret: document.getElementById('cf-arret').value,
    parent1_nom: p1nom,
    parent2_nom: p2nom,
    parent1_tel: p1tel,
    parent2_tel: p2tel,
    tel: document.getElementById('cf-tel').value.trim() || 'nan',
    chauffeur1: document.getElementById('cf-chauf1').value || p1nom || 'nan',
    tel_chauf1: p1tel || 'nan',
    chauffeur2: document.getElementById('cf-chauf2').value || p2nom || 'nan',
    tel_chauf2: p2tel || 'nan',
  };

  const oldPrenom = editingChildId !== null ? DATA.children[editingChildId].prenom : null;

  if (editingChildId !== null) {
    DATA.children[editingChildId] = child;
    // Propagate new prénom in rides if it changed
    if (oldPrenom && oldPrenom !== prenom) {
      DATA.rides.forEach(r => {
        const i = r.enfants.indexOf(oldPrenom);
        if (i >= 0) r.enfants[i] = prenom;
      });
    }
  } else {
    DATA.children.push(child);
  }

  // Propagate tel update to drivers list
  const drivers = getDriversData();
  [{ nom: p1nom, tel: p1tel }, { nom: p2nom, tel: p2tel }].forEach(({ nom: dn, tel: dt }) => {
    if (!dn || dn === 'nan') return;
    const di = drivers.findIndex(d => d.nom === dn);
    if (di >= 0) { if (dt && !drivers[di].tel) drivers[di].tel = dt; }
    else if (dn) drivers.push({ nom: dn, tel: dt, places: '', email: '', note: '', famille });
  });
  saveDriversData(drivers);

  saveData();
  closeModal();
  renderAdminChildrenList();
  refreshAll();
  showToast('✅ Enfant enregistré !');
  saveToGitHub(false);
}

function deleteChild(idx) {
  if (!confirm(`Supprimer ${DATA.children[idx].prenom} ?`)) return;
  DATA.children.splice(idx, 1);
  saveData();
  renderAdminChildrenList();
  refreshAll();
  showToast('🗑️ Enfant supprimé');
  saveToGitHub(false);
}






function closeModal() {
  document.getElementById('admin-modal').style.display = 'none';
  editingRideId = null;
  editingChildId = null;
}

// Close modal on overlay click (only if clicking directly on overlay or scroll bg, not content)
document.addEventListener('click', function(e) {
  const modal = document.getElementById('admin-modal');
  const scroll = document.getElementById('admin-modal-scroll');
  if (modal && (e.target === modal || e.target === scroll)) closeModal();
});

// ---- TOAST ----
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#232736;color:#e8eaf6;padding:10px 20px;border-radius:30px;font-weight:600;font-size:14px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.5);border:1px solid #2a2d3e;transition:opacity 0.3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// Refresh other views after data changes
function refreshAll() {
  // Refresh driver select
  const dSel = document.getElementById('driver-select');
  const curDriver = dSel.value;
  while (dSel.options.length > 1) dSel.remove(1);
  const drivers = [...new Set(DATA.rides.map(r => r.chauffeur))].sort();
  drivers.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dSel.appendChild(o); });
  if (curDriver) { dSel.value = curDriver; loadDriverRides(curDriver); }

  // Refresh child select
  const cSel = document.getElementById('child-select');
  const curChild = cSel.value;
  while (cSel.options.length > 1) cSel.remove(1);
  [...DATA.children].sort((a,b)=>a.prenom.localeCompare(b.prenom,'fr')).forEach(c => { const o = document.createElement('option'); o.value = c.prenom; const ini = (c.nom && c.nom!=='nan') ? ' ' + c.nom.trim()[0].toUpperCase() + '.' : ''; o.textContent = c.prenom + ini; cSel.appendChild(o); });
  if (curChild) { cSel.value = curChild; loadChildInfo(curChild); }
}
</script>
